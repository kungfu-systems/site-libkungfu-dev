schema = 1

[project]
type = "web-surface"
name = "site-libkungfu-dev"
site = "libkungfu-dev"

[badges]
kfd_1 = "planned"
kfd_2 = "planned"
kfd_3 = "planned"
release_passport_state = "declared"
workflows = ["buildchain-web-surface.yml"]

[channels.preview]
url_pattern = "https://{alias}.preview.libkungfu.dev"
visibility = "ephemeral"
requires_auth = false
access_control = "managed-network"
edge_auth = "none"
noindex = true

[channels.staging]
url = "https://staging.libkungfu.dev"
visibility = "protected"
requires_auth = false
access_control = "managed-network"
edge_auth = "none"
noindex = true
promotable = true

[channels.production]
url = "https://libkungfu.dev"
visibility = "public"
canonical = true
noindex = false

[surfaces.hub]
path = "/"
production_url = "https://libkungfu.dev"
staging_url = "https://staging.libkungfu.dev"
preview_url_pattern = "https://{alias}.preview.libkungfu.dev"

[surfaces.core]
path = "/core/"
production_url = "https://core.libkungfu.dev"
staging_url = "https://core.staging.libkungfu.dev"
preview_url_pattern = "https://core-{alias}.preview.libkungfu.dev"

[surfaces.buildchain]
path = "/buildchain/"
production_url = "https://buildchain.libkungfu.dev"
staging_url = "https://buildchain.staging.libkungfu.dev"
preview_url_pattern = "https://buildchain-{alias}.preview.libkungfu.dev"

[surfaces.kfd]
path = "/kfd/"
production_url = "https://kfd.libkungfu.dev"
staging_url = "https://kfd.staging.libkungfu.dev"
preview_url_pattern = "https://kfd-{alias}.preview.libkungfu.dev"

[deploy.preview]
adapter = "aws-s3-cloudfront"
directory_index_rewrite = "external"
bucket = "libkungfu-dev-preview-727884401362-us-east-1"
cloudfront_distribution = "E23JLOB98N6R7U"
artifact_path = "dist"
manifest_prefix = ".buildchain/deployments/preview"
secret_refs = ["AWS_ROLE_ARN"]

[deploy.staging]
adapter = "aws-s3-cloudfront"
directory_index_rewrite = "external"
bucket = "libkungfu-dev-staging-727884401362-us-east-1"
cloudfront_distribution = "E1B23YHEY9RCE0"
artifact_path = "dist"
manifest_prefix = ".buildchain/deployments/staging"
secret_refs = ["AWS_ROLE_ARN"]

[deploy.production]
adapter = "aws-s3-cloudfront"
directory_index_rewrite = "external"
bucket = "libkungfu-dev-site-727884401362-us-east-1"
cloudfront_distribution = "EXWVGLVVXGURT"
artifact_path = "dist"
manifest_prefix = ".buildchain/deployments/production"
secret_refs = ["AWS_ROLE_ARN"]

[retention.preview]
pr_days = 14
sha_days = 90

[retention.staging]
days = 90
keep_deploys = 10

[retention.production]
days = 365

[security.preview]
requires_auth = false
access_control = "managed-network"
edge_auth = "none"
noindex = true
isolated_providers = true
sandbox_data = true

[security.staging]
requires_auth = false
access_control = "managed-network"
edge_auth = "none"
noindex = true
isolated_providers = true
sandbox_data = true

[lifecycle.build]
command = "bash scripts/build-site.sh"

[lifecycle.verify]
command = "bash scripts/check-site.sh"
