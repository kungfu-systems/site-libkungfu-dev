name: Buildchain Web Surface

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - closed
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      production_approved:
        description: "Plan the gated production channel"
        type: boolean
        required: false
        default: false

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  web-surface:
    uses: kungfu-systems/buildchain/.github/workflows/.web-surface.yml@v2.3
    with:
      buildchain-ref: v2.3
      node-version: "24"
      build-command: npm run build
      verify-command: npm run check
      artifact-path: dist
      preview-apply: true
      preview-cleanup-apply: true
      preview-aws-role-arn: arn:aws:iam::727884401362:role/site-libkungfu-dev-preview-github-actions
      staging-apply: true
      staging-aws-role-arn: arn:aws:iam::727884401362:role/site-libkungfu-dev-staging-github-actions
      production-apply: false
      production-approved: ${{ github.event_name == 'workflow_dispatch' && inputs.production_approved }}
      production-environment: production
