name: Buildchain Web Surface

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - closed
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      buildchain_ref:
        description: "Optional trusted Buildchain runtime ref for manual validation"
        type: string
        required: false
        default: ""
      production_approved:
        description: "Apply the gated production channel for trusted manual dispatch"
        type: boolean
        required: false
        default: false

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  web-surface:
    uses: kungfu-systems/buildchain/.github/workflows/.web-surface.yml@v2.8.6
    with:
      buildchain-ref: ${{ github.event_name == 'workflow_dispatch' && inputs.buildchain_ref || '' }}
      node-version: "24"
      build-command: node scripts/prepare-kfd-upstream.mjs && pnpm install --lockfile-only --ignore-scripts --registry=https://registry.npmjs.org/ --config.minimumReleaseAge=0 && pnpm install --frozen-lockfile --ignore-scripts --registry=https://registry.npmjs.org/ && pnpm run build
      verify-command: pnpm run check
      artifact-path: dist
      preview-apply: true
      preview-cleanup-apply: true
      preview-aws-role-arn: arn:aws:iam::727884401362:role/site-libkungfu-dev-preview-github-actions
      staging-apply: true
      staging-aws-role-arn: arn:aws:iam::727884401362:role/site-libkungfu-dev-staging-github-actions
      production-apply: true
      production-approved: ${{ github.event_name == 'workflow_dispatch' && inputs.production_approved }}
      production-release-on-main: true
      production-release-label: buildchain-release
      production-release-head-prefix: release/
      production-aws-role-arn: arn:aws:iam::727884401362:role/site-libkungfu-dev-production-github-actions
      production-environment: production
