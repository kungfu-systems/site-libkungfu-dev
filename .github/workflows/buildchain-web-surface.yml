name: Buildchain Web Surface

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - closed
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      buildchain_ref:
        description: "Optional trusted Buildchain runtime ref for manual validation"
        type: string
        required: false
        default: ""
      production_approved:
        description: "Apply the gated production channel for trusted manual dispatch"
        type: boolean
        required: false
        default: false

permissions:
  contents: write
  issues: write
  id-token: write
  pull-requests: write

jobs:
  web-surface:
    uses: kungfu-systems/buildchain/.github/workflows/.web-surface.yml@v2-alpha
    with:
      buildchain-ref: ${{ github.event_name == 'workflow_dispatch' && inputs.buildchain_ref || '' }}
      buildchain-contract-lock-path: .buildchain/contract-lock.json
      buildchain-contract-compatibility-policy: major-compatible
      buildchain-contract-drift-issue-mode: compatible-and-breaking
      node-version: "24"
      build-command: |
        export SITE_GENERATED_AT="$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")"
        export SITE_PUBLISHED_AT="$SITE_GENERATED_AT"
        export SITE_TIMESTAMP_POLICY=ci-injected
        export SITE_SOURCE_REVISION="$GITHUB_SHA"
        export SITE_SURFACE_CHANNEL="${{ github.event_name == 'pull_request' && 'preview' || (github.event_name == 'workflow_dispatch' && inputs.production_approved && 'production' || 'staging') }}"
        export SITE_PREVIEW_ALIAS="${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || '' }}"
        node scripts/prepare-kfd-upstream.mjs
        pnpm install --lockfile-only --ignore-scripts --registry=https://registry.npmjs.org/ --config.minimumReleaseAge=0
        pnpm install --frozen-lockfile --ignore-scripts --registry=https://registry.npmjs.org/ --config.minimumReleaseAge=0
        pnpm --config.minimumReleaseAge=0 run build
      verify-command: |
        export SITE_SURFACE_CHANNEL="${{ github.event_name == 'pull_request' && 'preview' || (github.event_name == 'workflow_dispatch' && inputs.production_approved && 'production' || 'staging') }}"
        export SITE_PREVIEW_ALIAS="${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || '' }}"
        pnpm --config.minimumReleaseAge=0 run check
      artifact-path: dist
      preview-apply: true
      preview-cleanup-apply: true
      preview-aws-role-arn: arn:aws:iam::727884401362:role/site-libkungfu-dev-preview-github-actions
      staging-apply: true
      staging-aws-role-arn: arn:aws:iam::727884401362:role/site-libkungfu-dev-staging-github-actions
      production-apply: true
      production-approved: ${{ github.event_name == 'workflow_dispatch' && inputs.production_approved }}
      production-release-on-main: true
      production-release-app-client-id: ${{ vars.KUNGFU_RELEASE_APP_CLIENT_ID }}
      production-release-label: buildchain-release
      production-release-head-prefix: release/
      production-aws-role-arn: arn:aws:iam::727884401362:role/site-libkungfu-dev-production-github-actions
      production-environment: production
    secrets:
      production-release-app-private-key: ${{ secrets.KUNGFU_RELEASE_APP_PRIVATE_KEY }}
